<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicias Da Lucy | Cadastro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/login.js" defer></script>
</head>
<body class="login-page">
    <div class="login-container">
        <form id="form-cadastro-cliente" class="card-login">
    <a href="index.html" class="logo">Delicias<span> Da Lucy</span></a>
    <h2>Cadastro de Cliente</h2>
    
    <div class="form-group">
        <div class="input-with-icon">
            <span class="material-symbols-outlined">badge</span>
            <input type="text" id="nome" class="form-control" placeholder="Nome Completo" required>
        </div>
    </div>

    <div class="form-group">
        <div class="input-with-icon">
            <span class="material-symbols-outlined">mail</span>
            <input type="email" id="email" class="form-control" placeholder="seu@email.com" >
        </div>
    </div>

    <div class="form-group">
        <div class="input-with-icon">
            <span class="material-symbols-outlined">headphones</span>
            <input type="text" id="telefoneCliente" class="form-control" placeholder="(16) 9999-9999">
        </div>
    </div>
    
    <div class="form-group">
        <div class="input-with-icon">
            <span class="material-symbols-outlined">lock</span>
            <input type="password" id="senha" class="form-control" placeholder="Senha">
        </div>
    </div>
    
    <button type="submit" class="btn btn-primary">Finalizar Cadastro</button>
    <a href="./login cliente.html"><p> Já possui cadastro? Faça o login</p></a>
</form>
    </div>
</body>
</html>
